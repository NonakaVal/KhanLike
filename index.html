<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KhanLike — Exploradores</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/index-style.css">
</head>
<body>

<div class="stars-bg" id="starsBg"></div>

<div class="container">
  <header>
    <h3>KhanLike - Traduzam khan academy kids !!!!</h3>
    
  </header>

  <div class="activities-grid">
    <a href="games/alfabeto.html" class="activity-card" style="animation-delay:0.1s">
      <div class="card-thumb theme-pink">🍎</div>
      <div class="card-body">
        <div class="card-title">Alfabeto</div>
        <div class="card-chips">
          <span class="chip">🔤 Português</span>
        </div>
      </div>
    </a>
    <a href="games/vogais.html" class="activity-card" style="animation-delay:0.25s">
      <div class="card-thumb theme-purple">🔤</div>
      <div class="card-body">
        <div class="card-title">Jogo das Vogais</div>
        <div class="card-chips">
          <span class="chip">📖 Português</span>
        </div>
      </div>
    </a>


    <a href="games/abc.html" class="activity-card" style="animation-delay:0.05s">
      <div class="card-thumb theme-red">🎯</div>
      <div class="card-body">
        <div class="card-title">Jogo do Alfabeto</div>
        <div class="card-chips">
          <span class="chip">🔤 Português</span>
        </div>
      </div>
    </a>


    <a href="games/contarnumeros.html" class="activity-card" style="animation-delay:0.15s">
      <div class="card-thumb theme-green">🔢</div>
      <div class="card-body">
        <div class="card-title">Conta Números</div>
        <div class="card-chips">
          <span class="chip">🧮 Matemática</span>
        </div>
      </div>
    </a>

    <a href="games/memory-game.html" class="activity-card" style="animation-delay:0.2s">
      <div class="card-thumb theme-blue">🧩</div>
      <div class="card-body">
        <div class="card-title">Encontre os Pares</div>
        <div class="card-chips">
          <span class="chip">🧠 Memória</span>
        </div>
      </div>
    </a>


    <a href="games/turma.html" class="activity-card" style="animation-delay:0.3s">
      <div class="card-thumb theme-orange">🐶</div>
      <div class="card-body">
        <div class="card-title">Widget Sem Nome</div>
        <div class="card-chips">
          <span class="chip">✨ Divertido</span>
        </div>
      </div>
    </a>

  </div>
</div>

<footer></footer>

<script>
  const bg = document.getElementById('starsBg');
  const em = ['⭐','✨','💫','🌟','🎈','🌈'];

  for (let i = 0; i < 20; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.textContent = em[Math.floor(Math.random() * em.length)];
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.animationDelay = (Math.random() * 3) + 's';
    bg.appendChild(s);
  }
</script>

</body>
</html>
