<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KanAcademy — Aprender é uma aventura!</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sky: #5bc8f5;
    --yellow: #FFD740;
    --blue-deep: #1a4fa0;
    --white: #ffffff;
    --card-radius: 24px;
    --shadow-soft: 0 8px 30px rgba(0,0,0,0.12);
    --shadow-hover: 0 16px 40px rgba(0,0,0,0.20);
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: radial-gradient(circle at top left, #8de0ff 0%, #5bc8f5 40%, #1a6fa8 100%);
    min-height: 100vh;
    overflow-x: hidden;
    color: var(--blue-deep);
  }

  /* ─── HEADER SIMPLIFICADO ─── */
  header {
    background: rgba(26, 79, 160, 0.95);
    backdrop-filter: blur(10px);
    padding: 0 32px;
    height: 76px;
    display: flex;
    align-items: center;
    justify-content: center; /* Centralizado para foco total */
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
    text-decoration: none;
    transition: transform 0.2s;
  }
  .logo:hover { transform: scale(1.05); }

  .logo-icon {
    width: 48px;
    height: 48px;
    background: var(--yellow);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  }

  .logo-text {
    font-size: 1.8rem; font-weight: 900; color: var(--white);
    letter-spacing: -0.5px;
  }
  .logo-text span { color: var(--yellow); }

  /* ─── HERO ─── */
  .hero { text-align: center; padding: 60px 24px 40px; position: relative; }
  .hero h1 { font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 900; color: white; line-height: 1.1; margin-bottom: 20px; text-shadow: 0 4px 16px rgba(0,0,0,0.2); }
  .hero h1 em { font-style: normal; color: var(--yellow); display: block; }
  .hero p { font-size: 1.25rem; color: rgba(255,255,255,0.95); max-width: 580px; margin: 0 auto 36px; font-weight: 700; line-height: 1.5; }

  /* ─── SECTION & CARDS ─── */
  .section { position: relative; z-index: 1; padding: 20px 20px 60px; max-width: 1000px; margin: 0 auto; }
  .activities-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
  
  .activity-card {
    background: white; border-radius: var(--card-radius); overflow: hidden;
    box-shadow: var(--shadow-soft); cursor: pointer; text-decoration: none;
    display: flex; flex-direction: column; border: 4px solid transparent;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
  }
  .activity-card:hover { transform: translateY(-8px); box-shadow: var(--shadow-hover); border-color: rgba(255, 255, 255, 0.5); }
  .card-thumb { height: 180px; display: flex; align-items: center; justify-content: center; font-size: 80px; transition: transform 0.3s; }
  .activity-card:hover .card-thumb { transform: scale(1.05); }
  .card-body { padding: 20px 24px; flex-grow: 1; }
  .card-title { font-size: 1.4rem; font-weight: 900; color: var(--blue-deep); margin-bottom: 8px; line-height: 1.2; }
  .card-desc { font-size: 1rem; color: #556; font-weight: 600; line-height: 1.4; }
  .theme-blue { background: linear-gradient(135deg, #5bc8f5, #3a9ed4); }

  footer { background: var(--blue-deep); color: rgba(255,255,255,0.8); text-align: center; padding: 30px 20px; font-weight: 700; }
  footer strong { color: var(--yellow); }
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">
    <div class="logo-icon">🎓</div>
    <span class="logo-text">Kan<span>Academy</span></span>
  </a>
</header>

<section class="hero">
  <div style="position:relative;z-index:1;">
    <h1>Aprender é uma<br><em>Aventura Incrível!</em></h1>
    <p>Toque em um dos jogos abaixo para começar a brincadeira.</p>
  </div>
</section>

<div class="section">
  <div class="activities-grid">
    <a href="memory-game.html" class="activity-card">
      <div class="card-thumb theme-blue">🧩</div>
      <div class="card-body">
        <div class="card-title">Encontre os Pares</div>
        <div class="card-desc">Treine sua memória com os animais fofinhos!</div>
      </div>
    </a>
  </div>
</div>

<footer>
  Feito com ❤️ para pequenos grandes aprendizes — <strong>KanAcademy</strong> © 2026
</footer>

</body>
</html>
