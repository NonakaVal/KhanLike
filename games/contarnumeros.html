<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contagem Divertida — KanAcademy</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --theme-light: #8ef0a4;
    --theme-main:  #5de87a;
    --theme-dark:  #1daa50;
    --blue-deep:   #1a4fa0;
    --yellow:      #FFD740;
    --red:         #ff5555;
    --topbar-h:    64px;
    --botbar-h:    88px;
  }

  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: 'Nunito', sans-serif;
    background: radial-gradient(ellipse at center top, var(--theme-light), var(--theme-main));
    display: flex; flex-direction: column; user-select: none;
  }

  /* ── TOP BAR ── */
  .topbar {
    flex: 0 0 var(--topbar-h); background: var(--blue-deep);
    padding: 0 24px; display: flex; align-items: center; gap: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,.25); z-index: 10;
  }
  .back-link {
    color: #fff; text-decoration: none; font-size: 1.1rem; font-weight: 900;
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.15); padding: 8px 18px; border-radius: 50px;
    transition: background 0.2s, transform 0.2s;
  }
  .back-link:hover { background: rgba(255,255,255,0.25); }
  .back-link:active { transform: scale(0.95); }
  .topbar-spacer { flex: 1; }
  .sound-toggle {
    background: rgba(255,255,255,.15); border: none; color: #fff;
    font-size: 1.2rem; width: 44px; height: 44px; border-radius: 50px; cursor: pointer;
    transition: background 0.2s, transform 0.2s;
  }
  .sound-toggle:active { transform: scale(0.95); }
  .sound-toggle.muted { opacity: 0.5; }

  .diff-btn {
    background: rgba(255,255,255,0.2); border: none; color: #fff;
    padding: 8px 16px; border-radius: 50px; font-weight: 900; font-family: 'Nunito', sans-serif;
    cursor: pointer; transition: 0.2s; font-size: 1rem;
  }
  .diff-btn:hover { background: rgba(255,255,255,0.3); }
  .diff-btn:active { transform: scale(0.95); }

  /* ── BOARD AREA ── */
  .board-wrap {
    flex: 1 1 0; min-height: 0; display: flex; flex-direction: column;
    align-items: center; padding: 24px; overflow: hidden; position: relative;
    max-width: 960px; margin: 0 auto; width: 100%;
  }

  .question-title {
    font-size: 2rem; font-weight: 900; color: var(--blue-deep);
    text-shadow: 0 2px 4px rgba(255,255,255,0.5); margin-bottom: 20px;
    text-align: center;
  }

  .objects-container {
    flex: 1; display: flex; flex-wrap: wrap; justify-content: center; align-content: center;
    gap: 20px; width: 100%; max-width: 600px;
  }

  .count-obj {
    font-size: 4rem; animation: floatObj 2s ease-in-out infinite alternate;
    filter: drop-shadow(0 8px 12px rgba(0,0,0,0.15));
  }
  @keyframes floatObj {
    0% { transform: translateY(0) scale(1); }
    100% { transform: translateY(-15px) scale(1.05); }
  }

  .options-container {
    display: flex; gap: 16px; margin-top: 30px; flex-wrap: wrap; justify-content: center;
  }

  .opt-btn {
    width: 80px; height: 80px; border-radius: 24px;
    background: #fff; border: 4px solid var(--blue-deep);
    color: var(--blue-deep); font-size: 2.5rem; font-weight: 900;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: 0 8px 0 var(--blue-deep);
    transition: all 0.1s;
  }
  .opt-btn:active { transform: translateY(8px); box-shadow: 0 0 0 var(--blue-deep); }
  
  .opt-btn.correct { background: var(--theme-main); color: #fff; border-color: #fff; box-shadow: 0 8px 0 #1daa50; }
  .opt-btn.wrong { background: var(--red); color: #fff; border-color: #fff; box-shadow: 0 8px 0 #c0392b; animation: shake 0.4s ease; }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  /* ── BOT BAR ── */
  .botbar {
    flex: 0 0 var(--botbar-h); background: var(--blue-deep);
    display: flex; align-items: center; justify-content: center;
    padding: 0 28px; box-shadow: 0 -4px 20px rgba(0,0,0,.2);
  }
  .progress-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .progress-label { color: rgba(255,255,255,.75); font-size: 1rem; font-weight: 900; }
  .progress-track {
    width: 200px; height: 14px; background: rgba(255,255,255,.15);
    border-radius: 99px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--yellow), #ffb300);
    border-radius: 99px; width: 0%; transition: width 0.4s cubic-bezier(.25,.8,.25,1);
  }

  /* ── WIN OVERLAY ── */
  .win-overlay {
    position: fixed; inset: 0; background: rgba(26,79,160,.88); backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: center;
    z-index: 999; opacity: 0; pointer-events: none; transition: opacity .4s;
  }
  .win-overlay.show { opacity: 1; pointer-events: all; }
  .win-box {
    background: #fff; border-radius: 32px; padding: 40px 48px; text-align: center;
    max-width: 460px; width: 92%; transform: scale(0.8) translateY(20px);
    transition: transform .5s cubic-bezier(.25,.8,.25,1); box-shadow: 0 30px 80px rgba(0,0,0,.35);
  }
  .win-overlay.show .win-box { transform: scale(1) translateY(0); }
  .win-box h2 { font-size: 2.4rem; font-weight: 900; color: var(--blue-deep); margin-bottom: 24px; }
  .win-btn {
    background: var(--theme-main); color: #fff; font-weight: 900; font-size: 1.2rem;
    padding: 16px 28px; border: none; border-radius: 50px; cursor: pointer; width: 100%;
    box-shadow: 0 6px 0 var(--theme-dark); transition: all 0.1s;
  }
  .win-btn:active { transform: translateY(6px); box-shadow: 0 0 0 var(--theme-dark); }

  /* ── PARTICLES ── */
  .particle {
    position: fixed; pointer-events: none; z-index: 9999; font-size: 32px;
    animation: particleFly 1.2s ease-out forwards;
  }
  @keyframes particleFly {
    0% { opacity: 1; transform: translate(0,0) scale(1) rotate(0deg); }
    100% { opacity: 0; transform: var(--dest) scale(0.4) rotate(var(--rot)); }
  }

  @media (max-width: 600px) {
    .count-obj { font-size: 3rem; }
    .opt-btn { width: 64px; height: 64px; font-size: 2rem; }
  }
</style>
</head>
<body>

<div class="topbar">
  <a href="../index.html" class="back-link">⬅ Voltar</a>
  <button id="diffToggle" class="diff-btn" onclick="toggleDiff()">Fácil (1-5)</button>
  <div class="topbar-spacer"></div>
  <button class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊</button>
</div>

<div class="board-wrap">
  <div class="question-title">Quantos tem aqui?</div>
  <div class="objects-container" id="objectsContainer"></div>
  <div class="options-container" id="optionsContainer"></div>
</div>

<div class="botbar">
  <div class="progress-wrap">
    <span class="progress-label" id="progressLabel">0 / 5 rodadas</span>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  </div>
</div>

<div class="win-overlay" id="winOverlay">
  <div class="win-box">
    <div style="font-size: 80px; margin-bottom: 10px;">🏆</div>
    <h2>Você é um mestre da contagem!</h2>
    <button class="win-btn" onclick="initGame()">Jogar Novamente</button>
  </div>
</div>

<script>
let soundEnabled = true;
let audioCtx = null;
const TOTAL_ROUNDS = 5;
let currentRound = 0;
let correctAnswer = 0;
let isLocked = false;

const LEVELS = [
  { id: 'facil', name: 'Fácil (1-5)', min: 1, max: 5 },
  { id: 'medio', name: 'Médio (1-10)', min: 1, max: 10 },
  { id: 'dificil', name: 'Difícil (1-20)', min: 1, max: 20 }
];
let currentLevelIdx = 0;

const EMOJIS = ['🍎','🐶','🚗','⭐','🎈','🍕','🐸','🚀','⚽','🐢'];

function playTone(freq, dur, type='sine') {
  if (!soundEnabled) return;
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = type; osc.frequency.value = freq;
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
  osc.start(); osc.stop(audioCtx.currentTime + dur);
}

const Sounds = {
  correct: () => { playTone(600,0.1); setTimeout(()=>playTone(800,0.2), 100); },
  wrong: () => { playTone(300,0.2,'triangle'); setTimeout(()=>playTone(250,0.3,'triangle'), 150); },
  win: () => { [523, 659, 783, 1046].forEach((f,i) => setTimeout(()=>playTone(f,0.3), i*150)); }
};

function toggleSound() {
  soundEnabled = !soundEnabled;
  document.getElementById('soundToggle').textContent = soundEnabled ? '🔊' : '🔇';
  document.getElementById('soundToggle').classList.toggle('muted', !soundEnabled);
}

function toggleDiff() {
  currentLevelIdx = (currentLevelIdx + 1) % LEVELS.length;
  document.getElementById('diffToggle').textContent = LEVELS[currentLevelIdx].name;
  initGame();
}

function spawnParticles() {
  for (let i=0; i<15; i++) {
    const el = document.createElement('div');
    el.className = 'particle';
    el.textContent = '✨';
    const dx = (Math.random()-0.5)*400, dy = (Math.random()-0.5)*400;
    el.style.cssText = `left:50%;top:50%;--dest:translate(${dx}px,${dy}px);--rot:${(Math.random()-0.5)*720}deg;`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 1200);
  }
}

function initGame() {
  currentRound = 0;
  document.getElementById('winOverlay').classList.remove('show');
  updateProgress();
  nextRound();
}

function nextRound() {
  if (currentRound >= TOTAL_ROUNDS) {
    Sounds.win();
    document.getElementById('winOverlay').classList.add('show');
    spawnParticles();
    return;
  }
  
  isLocked = false;
  const level = LEVELS[currentLevelIdx];
  correctAnswer = Math.floor(Math.random() * (level.max - level.min + 1)) + level.min;
  const emoji = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
  
  const objCont = document.getElementById('objectsContainer');
  objCont.innerHTML = '';

  let objSize = '4rem';
  if (correctAnswer > 15) objSize = '2.5rem';
  else if (correctAnswer > 10) objSize = '3.2rem';

  for(let i=0; i<correctAnswer; i++) {
    const span = document.createElement('span');
    span.className = 'count-obj';
    span.textContent = emoji;
    span.style.fontSize = objSize;
    span.style.animationDelay = `${Math.random()*0.5}s`;
    objCont.appendChild(span);
  }

  let options = new Set([correctAnswer]);
  while(options.size < 4) {
    let wrong;
    if (level.id === 'facil') {
      wrong = Math.floor(Math.random() * 5) + 1;
    } else if (level.id === 'medio') {
      wrong = Math.floor(Math.random() * 10) + 1;
    } else {
      wrong = correctAnswer + (Math.floor(Math.random() * 7) - 3);
      if (wrong < 1 || wrong > 25) wrong = Math.floor(Math.random() * 20) + 1;
    }
    if(wrong > 0 && wrong <= 25) options.add(wrong);
  }
  
  const optCont = document.getElementById('optionsContainer');
  optCont.innerHTML = '';
  Array.from(options).sort(()=>Math.random()-0.5).forEach(num => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = num;
    btn.onclick = () => handleAnswer(num, btn);
    optCont.appendChild(btn);
  });
}

function handleAnswer(num, btn) {
  if (isLocked) return;
  
  if (num === correctAnswer) {
    isLocked = true;
    Sounds.correct();
    btn.classList.add('correct');
    currentRound++;
    updateProgress();
    setTimeout(nextRound, 1000);
  } else {
    Sounds.wrong();
    btn.classList.add('wrong');
    setTimeout(() => btn.classList.remove('wrong'), 500);
  }
}

function updateProgress() {
  const pct = (currentRound / TOTAL_ROUNDS) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${currentRound} / ${TOTAL_ROUNDS} rodadas`;
}

initGame();
</script>
</body>
</html>
