<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo das Vogais — KanAcademy</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --theme-light: #8de0ff;
    --theme-main:  #5bc8f5;
    --theme-dark:  #1a6fa8;
    --blue-deep:   #1a4fa0;
    --yellow:      #FFD740;
    --red:         #ff5555;
    --orange:      #ff9800;
    --green:       #5DE87A;
    --purple:      #c77dff;
    --topbar-h:    64px;
    --botbar-h:    88px;
  }

  html, body { width: 100%; height: 100%; overflow: hidden; touch-action: none; } /* touch-action: none previne scroll ao arrastar */
  body {
    font-family: 'Nunito', sans-serif;
    background: radial-gradient(ellipse at center top, var(--theme-light), var(--theme-main));
    display: flex; flex-direction: column; user-select: none;
  }

  /* ── TOP BAR ── */
  .topbar {
    flex: 0 0 var(--topbar-h); background: var(--blue-deep);
    padding: 0 24px; display: flex; align-items: center; gap: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,.25); z-index: 10;
  }
  .back-link {
    color: #fff; text-decoration: none; font-size: 1.1rem; font-weight: 900;
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.15); padding: 8px 18px; border-radius: 50px;
    transition: background 0.2s, transform 0.2s;
  }
  .back-link:active { transform: scale(0.95); }
  .topbar-spacer { flex: 1; }
  .sound-toggle {
    background: rgba(255,255,255,.15); border: none; color: #fff;
    font-size: 1.2rem; width: 44px; height: 44px; border-radius: 50px; cursor: pointer;
    transition: background 0.2s, transform 0.2s;
  }
  .sound-toggle:active { transform: scale(0.95); }
  .sound-toggle.muted { opacity: 0.5; }

  /* ── BOARD AREA ── */
  .board-wrap {
    flex: 1 1 0; min-height: 0; display: flex; flex-direction: column;
    align-items: center; padding: 24px; position: relative;
    max-width: 1000px; margin: 0 auto; width: 100%; justify-content: space-evenly;
  }

  .instruction {
    font-size: 1.8rem; font-weight: 900; color: var(--blue-deep);
    text-shadow: 0 2px 4px rgba(255,255,255,0.5); text-align: center;
  }

  /* ── DROP ZONES (VOWELS) ── */
  .vowels-container {
    display: flex; gap: 16px; width: 100%; justify-content: center; flex-wrap: wrap;
  }
  
  .vowel-drop {
    width: 90px; height: 110px; border-radius: 24px;
    display: flex; align-items: center; justify-content: center;
    font-size: 4rem; font-weight: 900; color: #fff;
    box-shadow: inset 0 -6px 0 rgba(0,0,0,0.15), 0 8px 16px rgba(0,0,0,0.1);
    transition: transform 0.2s, filter 0.2s; position: relative;
  }
  .vowel-drop.hovered { transform: scale(1.1); filter: brightness(1.2); }
  
  /* Cores das Vogais */
  .vowel-A { background: var(--red); }
  .vowel-E { background: var(--orange); }
  .vowel-I { background: var(--green); }
  .vowel-O { background: var(--theme-dark); }
  .vowel-U { background: var(--purple); }

  /* ── DRAGGABLE ITEMS ── */
  .items-container {
    display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;
    min-height: 120px;
  }

  .drag-item {
    width: 80px; height: 80px; border-radius: 50%;
    background: #fff; border: 4px solid var(--blue-deep);
    display: flex; align-items: center; justify-content: center;
    font-size: 3rem; cursor: grab; box-shadow: 0 6px 0 var(--blue-deep);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s;
    touch-action: none; /* Crucial para o pointer events no mobile */
  }
  .drag-item.dragging {
    transition: none; cursor: grabbing; z-index: 100;
    box-shadow: 0 16px 24px rgba(0,0,0,0.2); filter: drop-shadow(0 0 8px rgba(255,255,255,0.8));
  }
  .drag-item.correct-anim {
    transform: scale(0) !important; opacity: 0; pointer-events: none;
  }
  .drag-item.wrong-anim {
    animation: shake 0.4s ease;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-10px); }
    75% { transform: translateX(10px); }
  }

  /* ── BOT BAR ── */
  .botbar {
    flex: 0 0 var(--botbar-h); background: var(--blue-deep);
    display: flex; align-items: center; justify-content: center;
    padding: 0 28px; box-shadow: 0 -4px 20px rgba(0,0,0,.2); z-index: 10;
  }
  .progress-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .progress-label { color: rgba(255,255,255,.75); font-size: 1rem; font-weight: 900; }
  .progress-track {
    width: 250px; height: 14px; background: rgba(255,255,255,.15);
    border-radius: 99px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--yellow), #ffb300);
    border-radius: 99px; width: 0%; transition: width 0.4s cubic-bezier(.25,.8,.25,1);
  }

  /* ── WIN OVERLAY ── */
  .win-overlay {
    position: fixed; inset: 0; background: rgba(26,79,160,.88); backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: center;
    z-index: 999; opacity: 0; pointer-events: none; transition: opacity .4s;
  }
  .win-overlay.show { opacity: 1; pointer-events: all; }
  .win-box {
    background: #fff; border-radius: 32px; padding: 40px 48px; text-align: center;
    max-width: 460px; width: 92%; transform: scale(0.8) translateY(20px);
    transition: transform .5s cubic-bezier(.25,.8,.25,1); box-shadow: 0 30px 80px rgba(0,0,0,.35);
  }
  .win-overlay.show .win-box { transform: scale(1) translateY(0); }
  .win-box h2 { font-size: 2.4rem; font-weight: 900; color: var(--blue-deep); margin-bottom: 24px; }
  .win-btn {
    background: var(--theme-main); color: #fff; font-weight: 900; font-size: 1.2rem;
    padding: 16px 28px; border: none; border-radius: 50px; cursor: pointer; width: 100%;
    box-shadow: 0 6px 0 var(--theme-dark); transition: all 0.1s;
  }
  .win-btn:active { transform: translateY(6px); box-shadow: 0 0 0 var(--theme-dark); }

  /* ── PARTICLES ── */
  .particle {
    position: fixed; pointer-events: none; z-index: 9999; font-size: 32px;
    animation: particleFly 1s ease-out forwards;
  }
  @keyframes particleFly {
    0% { opacity: 1; transform: translate(0,0) scale(1) rotate(0deg); }
    100% { opacity: 0; transform: var(--dest) scale(0.4) rotate(var(--rot)); }
  }

  @media (max-width: 600px) {
    .vowel-drop { width: 60px; height: 80px; font-size: 2.5rem; border-radius: 16px; }
    .drag-item { width: 64px; height: 64px; font-size: 2.2rem; border-width: 3px; box-shadow: 0 4px 0 var(--blue-deep); }
    .instruction { font-size: 1.4rem; }
  }
</style>
</head>
<body>

<div class="topbar">
  <a href="../index.html" class="back-link">⬅ Voltar</a>
  <div class="topbar-spacer"></div>
  <button class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊</button>
</div>

<div class="board-wrap">
  <div class="instruction">Arrasta o objeto para a vogal correta!</div>
  
  <div class="vowels-container" id="vowelsContainer">
    <div class="vowel-drop vowel-A" data-vowel="A">A</div>
    <div class="vowel-drop vowel-E" data-vowel="E">E</div>
    <div class="vowel-drop vowel-I" data-vowel="I">I</div>
    <div class="vowel-drop vowel-O" data-vowel="O">O</div>
    <div class="vowel-drop vowel-U" data-vowel="U">U</div>
  </div>

  <div class="items-container" id="itemsContainer"></div>
</div>

<div class="botbar">
  <div class="progress-wrap">
    <span class="progress-label" id="progressLabel">0 / 15 Objetos</span>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  </div>
</div>

<div class="win-overlay" id="winOverlay">
  <div class="win-box">
    <div style="font-size: 80px; margin-bottom: 10px;">🌟</div>
    <h2>Conheces todas as Vogais!</h2>
    <button class="win-btn" onclick="initGame()">Jogar Novamente</button>
  </div>
</div>

<script>
let soundEnabled = true;
let audioCtx = null;

// Dicionário de objetos em Português (Portugal)
const DICTIONARY = {
  'A': [
    { word: 'Avião', emoji: '✈️' }, { word: 'Árvore', emoji: '🌳' }, 
    { word: 'Aranha', emoji: '🕷️' }, { word: 'Anel', emoji: '💍' }, { word: 'Abelha', emoji: '🐝' }
  ],
  'E': [
    { word: 'Estrela', emoji: '⭐' }, { word: 'Elefante', emoji: '🐘' }, 
    { word: 'Escova', emoji: '🪥' }, { word: 'Espelho', emoji: '🪞' }, { word: 'Esquilo', emoji: '🐿️' }
  ],
  'I': [
    { word: 'Íman', emoji: '🧲' }, { word: 'Igreja', emoji: '⛪' }, 
    { word: 'Ilha', emoji: '🏝️' }, { word: 'Ioiô', emoji: '🪀' }, { word: 'Iguana', emoji: '🦎' }
  ],
  'O': [
    { word: 'Ovelha', emoji: '🐑' }, { word: 'Olho', emoji: '👁️' }, 
    { word: 'Ovo', emoji: '🥚' }, { word: 'Óculos', emoji: '👓' }, { word: 'Osso', emoji: '🦴' }
  ],
  'U': [
    { word: 'Urso', emoji: '🐻' }, { word: 'Uva', emoji: '🍇' }, 
    { word: 'Unha', emoji: '💅' }, { word: 'Unicórnio', emoji: '🦄' }, { word: 'Universo', emoji: '🌌' }
  ]
};

const ITEMS_PER_ROUND = 5;
const TOTAL_ROUNDS = 3; 
const TOTAL_ITEMS = ITEMS_PER_ROUND * TOTAL_ROUNDS;

let currentRound = 0;
let itemsPlacedTotal = 0;
let itemsPlacedRound = 0;

// Sistema de Som
function playTone(freq, dur, type='sine') {
  if (!soundEnabled) return;
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = type; osc.frequency.value = freq;
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
  osc.start(); osc.stop(audioCtx.currentTime + dur);
}

const Sounds = {
  grab: () => playTone(400, 0.05),
  correct: () => { playTone(600, 0.1); setTimeout(()=>playTone(800, 0.2), 100); },
  wrong: () => { playTone(300, 0.2, 'triangle'); setTimeout(()=>playTone(250, 0.3, 'triangle'), 150); },
  win: () => { [523, 659, 783, 1046].forEach((f,i) => setTimeout(()=>playTone(f, 0.3), i*150)); }
};

function toggleSound() {
  soundEnabled = !soundEnabled;
  document.getElementById('soundToggle').textContent = soundEnabled ? '🔊' : '🔇';
  document.getElementById('soundToggle').classList.toggle('muted', !soundEnabled);
}

// Sistema de Partículas
function spawnParticles(x, y) {
  for (let i = 0; i < 10; i++) {
    const el = document.createElement('div');
    el.className = 'particle'; el.textContent = '✨';
    const dx = (Math.random() - 0.5) * 200, dy = (Math.random() - 0.5) * 200;
    el.style.cssText = `left:${x}px;top:${y}px;--dest:translate(${dx}px,${dy}px);--rot:${(Math.random()-0.5)*720}deg;`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1000);
  }
}

// Lógica de Jogo
function initGame() {
  currentRound = 0;
  itemsPlacedTotal = 0;
  document.getElementById('winOverlay').classList.remove('show');
  updateProgress();
  loadRound();
}

function loadRound() {
  if (currentRound >= TOTAL_ROUNDS) {
    Sounds.win();
    document.getElementById('winOverlay').classList.add('show');
    spawnParticles(window.innerWidth/2, window.innerHeight/2);
    return;
  }

  itemsPlacedRound = 0;
  const container = document.getElementById('itemsContainer');
  container.innerHTML = '';

  // Selecionar 1 item aleatório de cada vogal
  let roundItems = [];
  const vowels = ['A', 'E', 'I', 'O', 'U'];
  vowels.forEach(v => {
    const list = DICTIONARY[v];
    const item = list[Math.floor(Math.random() * list.length)];
    roundItems.push({ vowel: v, ...item });
  });

  // Embaralhar
  roundItems.sort(() => Math.random() - 0.5);

  // Renderizar
  roundItems.forEach((item, index) => {
    const el = document.createElement('div');
    el.className = 'drag-item';
    el.textContent = item.emoji;
    el.title = item.word;
    el.dataset.vowel = item.vowel;
    
    // Animação de entrada
    el.style.transform = 'scale(0)';
    setTimeout(() => { el.style.transform = 'scale(1)'; }, index * 100);
    
    attachDragEvents(el);
    container.appendChild(el);
  });
}

// Sistema de Drag & Drop Customizado (Funciona em Rato e Touch)
function attachDragEvents(el) {
  let isDragging = false;
  let startX = 0, startY = 0;
  let currentX = 0, currentY = 0;

  el.addEventListener('pointerdown', (e) => {
    if (el.classList.contains('correct-anim')) return;
    isDragging = true;
    Sounds.grab();
    
    startX = e.clientX - currentX;
    startY = e.clientY - currentY;
    
    el.setPointerCapture(e.pointerId);
    el.classList.add('dragging');
  });

  el.addEventListener('pointermove', (e) => {
    if (!isDragging) return;
    e.preventDefault(); // Evita scroll no mobile
    
    currentX = e.clientX - startX;
    currentY = e.clientY - startY;
    
    el.style.transform = `translate(${currentX}px, ${currentY}px) scale(1.1)`;

    // Detectar hover visual nas zonas de drop
    const dropZones = document.querySelectorAll('.vowel-drop');
    dropZones.forEach(z => z.classList.remove('hovered'));
    
    const rect = el.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;

    dropZones.forEach(zone => {
      const zRect = zone.getBoundingClientRect();
      if (centerX >= zRect.left && centerX <= zRect.right &&
          centerY >= zRect.top && centerY <= zRect.bottom) {
        zone.classList.add('hovered');
      }
    });
  });

  el.addEventListener('pointerup', (e) => {
    if (!isDragging) return;
    isDragging = false;
    el.releasePointerCapture(e.pointerId);
    el.classList.remove('dragging');

    const dropZones = document.querySelectorAll('.vowel-drop');
    let droppedZone = null;
    
    const rect = el.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;

    dropZones.forEach(zone => {
      zone.classList.remove('hovered');
      const zRect = zone.getBoundingClientRect();
      if (centerX >= zRect.left && centerX <= zRect.right &&
          centerY >= zRect.top && centerY <= zRect.bottom) {
        droppedZone = zone;
      }
    });

    if (droppedZone) {
      if (droppedZone.dataset.vowel === el.dataset.vowel) {
        // Correto!
        Sounds.correct();
        spawnParticles(centerX, centerY);
        el.style.transform = `translate(${currentX}px, ${currentY}px) scale(0)`;
        el.classList.add('correct-anim');
        
        itemsPlacedRound++;
        itemsPlacedTotal++;
        updateProgress();

        if (itemsPlacedRound === ITEMS_PER_ROUND) {
          currentRound++;
          setTimeout(loadRound, 800);
        }
      } else {
        // Errado
        Sounds.wrong();
        resetPosition(el);
        el.classList.add('wrong-anim');
        setTimeout(() => el.classList.remove('wrong-anim'), 400);
      }
    } else {
      // Largou fora da zona
      resetPosition(el);
    }
  });

  function resetPosition(element) {
    currentX = 0; currentY = 0;
    element.style.transform = `translate(0px, 0px) scale(1)`;
  }
}

function updateProgress() {
  const pct = (itemsPlacedTotal / TOTAL_ITEMS) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${itemsPlacedTotal} / ${TOTAL_ITEMS} Objetos`;
}

// Iniciar
window.onload = initGame;
</script>
</body>
</html>
