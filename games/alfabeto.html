<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Alfabeto Divertido — KanAcademy</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --theme-light: #e0b3ff;
    --theme-main:  #c77dff;
    --theme-dark:  #9d4edd;
    --blue-deep:   #1a4fa0;
    --white:       #ffffff;
    --yellow:      #FFD740;
    --shadow-soft: 0 8px 24px rgba(0,0,0,0.15);
    --topbar-h:    64px;
  }

  html, body { 
    width: 100%; 
    height: 100%; 
    overflow: hidden; 
    touch-action: manipulation;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: radial-gradient(ellipse at center top, var(--theme-light), var(--theme-main));
    display: flex; 
    flex-direction: column; 
    user-select: none;
    color: var(--blue-deep);
  }

  .topbar {
    height: var(--topbar-h);
    background: var(--blue-deep);
    padding: 0 22px;
    display: flex;
    align-items: center;
    box-shadow: 0 4px 20px rgba(0,0,0,.25);
    z-index: 10;
  }

  .back-link {
    color: #fff;
    text-decoration: none;
    font-size: 1.1rem;
    font-weight: 900;
    background: rgba(255,255,255,0.15);
    padding: 8px 18px;
    border-radius: 999px;
  }

  .spacer { width: 44px; } 

  .game-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 20px;
    overflow-y: auto;
    align-items: center;
    gap: 20px;
  }

  .display-box {
    width: 100%;
    max-width: 400px;
    height: 200px;
    background: var(--white);
    border-radius: 24px;
    box-shadow: var(--shadow-soft);
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 20px;
    border: 6px solid rgba(255,255,255,0.5);
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  .display-box.pop {
    transform: scale(1.05);
  }

  .display-letter {
    font-size: 100px;
    font-weight: 900;
    line-height: 1;
    color: var(--theme-dark);
    text-shadow: 2px 2px 0px rgba(0,0,0,0.1);
  }

  .display-info {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .display-emoji {
    font-size: 70px;
    line-height: 1;
    animation: float 3s ease-in-out infinite;
  }

  .display-word {
    font-size: 28px;
    font-weight: 800;
    color: var(--blue-deep);
    margin-top: 8px;
    text-transform: uppercase;
  }

  .alphabet-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
    gap: 12px;
    width: 100%;
    max-width: 600px;
    padding-bottom: 30px;
  }

  .letter-btn {
    background: var(--white);
    border: none;
    border-radius: 16px;
    height: 60px;
    font-size: 32px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    color: var(--blue-deep);
    box-shadow: 0 6px 0px rgba(0,0,0,0.1);
    cursor: pointer;
    transition: all 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .letter-btn:active, .letter-btn.active {
    transform: translateY(6px);
    box-shadow: 0 0px 0px rgba(0,0,0,0.1);
    background: var(--yellow);
    color: var(--theme-dark);
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .particle {
    position: absolute;
    pointer-events: none;
    font-size: 24px;
    animation: popOut 0.8s cubic-bezier(0, .9, .5, 1) forwards;
    z-index: 50;
  }

  @keyframes popOut {
    0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
    80% { opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(1.5) rotate(var(--rot)); opacity: 0; }
  }

  @media (max-width: 400px) {
    .alphabet-grid { grid-template-columns: repeat(5, 1fr); gap: 8px; }
    .letter-btn { height: 50px; font-size: 24px; }
    .display-box { height: 160px; gap: 10px; }
    .display-letter { font-size: 70px; }
    .display-emoji { font-size: 50px; }
    .display-word { font-size: 20px; }
  }
</style>
</head>
<body>
<div class="topbar">
  <a href="../index.html" class="back-link">⬅ Voltar</a>
</div>

<main class="game-area">
  <div class="display-box" id="displayBox">
    <div class="display-letter" id="displayLetter">?</div>
    <div class="display-info">
      <div class="display-emoji" id="displayEmoji">✨</div>
      <div class="display-word" id="displayWord">Toque!</div>
    </div>
  </div>

  <div class="alphabet-grid" id="alphabetGrid"></div>
</main>

<script>
  const alphabetData = [
    { letter: 'A', examples: [
      { word: 'Abelha', emoji: '🐝' },
      { word: 'Avião', emoji: '✈️' },
      { word: 'Aranha', emoji: '🕷️' }
    ]},
    { letter: 'B', examples: [
      { word: 'Bola', emoji: '⚽' },
      { word: 'Banana', emoji: '🍌' },
      { word: 'Borboleta', emoji: '🦋' }
    ]},
    { letter: 'C', examples: [
      { word: 'Cachorro', emoji: '🐶' },
      { word: 'Casa', emoji: '🏠' },
      { word: 'Coração', emoji: '❤️' }
    ]},
    { letter: 'D', examples: [
      { word: 'Dado', emoji: '🎲' },
      { word: 'Dinossauro', emoji: '🦖' },
      { word: 'Diamante', emoji: '💎' }
    ]},
    { letter: 'E', examples: [
      { word: 'Elefante', emoji: '🐘' },
      { word: 'Estrela', emoji: '⭐' },
      { word: 'Escova', emoji: '🪥' }
    ]},
    { letter: 'F', examples: [
      { word: 'Foguete', emoji: '🚀' },
      { word: 'Flor', emoji: '🌸' },
      { word: 'Foca', emoji: '🦭' }
    ]},
    { letter: 'G', examples: [
      { word: 'Gato', emoji: '🐱' },
      { word: 'Girafa', emoji: '🦒' },
      { word: 'Guitarra', emoji: '🎸' }
    ]},
    { letter: 'H', examples: [
      { word: 'Helicóptero', emoji: '🚁' },
      { word: 'Hospital', emoji: '🏥' },
      { word: 'Hambúrguer', emoji: '🍔' }
    ]},
    { letter: 'I', examples: [
      { word: 'Ilha', emoji: '🏝️' },
      { word: 'Iguana', emoji: '🦎' },
      { word: 'Iogurte', emoji: '🍦' }
    ]},
    { letter: 'J', examples: [
      { word: 'Jacaré', emoji: '🐊' },
      { word: 'Janela', emoji: '🪟' },
      { word: 'Joaninha', emoji: '🐞' }
    ]},
    { letter: 'K', examples: [
      { word: 'Kiwi', emoji: '🥝' },
      { word: 'Karaokê', emoji: '🎤' },
      { word: 'Kart', emoji: '🏎️' }
    ]},
    { letter: 'L', examples: [
      { word: 'Leão', emoji: '🦁' },
      { word: 'Lua', emoji: '🌙' },
      { word: 'Lápis', emoji: '✏️' }
    ]},
    { letter: 'M', examples: [
      { word: 'Macaco', emoji: '🐵' },
      { word: 'Maçã', emoji: '🍎' },
      { word: 'Moto', emoji: '🏍️' }
    ]},
    { letter: 'N', examples: [
      { word: 'Nuvem', emoji: '☁️' },
      { word: 'Navio', emoji: '🚢' },
      { word: 'Nariz', emoji: '👃' }
    ]},
    { letter: 'O', examples: [
      { word: 'Ovelha', emoji: '🐑' },
      { word: 'Ovo', emoji: '🥚' },
      { word: 'Óculos', emoji: '👓' }
    ]},
    { letter: 'P', examples: [
      { word: 'Pato', emoji: '🦆' },
      { word: 'Pipoca', emoji: '🍿' },
      { word: 'Peixe', emoji: '🐟' }
    ]},
    { letter: 'Q', examples: [
      { word: 'Queijo', emoji: '🧀' },
      { word: 'Quadro', emoji: '🖼️' },
      { word: 'Quati', emoji: '🦝' }
    ]},
    { letter: 'R', examples: [
      { word: 'Robô', emoji: '🤖' },
      { word: 'Rato', emoji: '🐭' },
      { word: 'Relógio', emoji: '⏰' }
    ]},
    { letter: 'S', examples: [
      { word: 'Sapo', emoji: '🐸' },
      { word: 'Sol', emoji: '☀️' },
      { word: 'Sorvete', emoji: '🍨' }
    ]},
    { letter: 'T', examples: [
      { word: 'Trem', emoji: '🚆' },
      { word: 'Tigre', emoji: '🐯' },
      { word: 'Telefone', emoji: '📞' }
    ]},
    { letter: 'U', examples: [
      { word: 'Uva', emoji: '🍇' },
      { word: 'Urso', emoji: '🐻' },
      { word: 'Unicórnio', emoji: '🦄' }
    ]},
    { letter: 'V', examples: [
      { word: 'Vaca', emoji: '🐮' },
      { word: 'Violão', emoji: '🎸' },
      { word: 'Vela', emoji: '🕯️' }
    ]},
    { letter: 'W', examples: [
      { word: 'Wafer', emoji: '🧇' },
      { word: 'Web', emoji: '🌐' },
      { word: 'Walkie-talkie', emoji: '📻' }
    ]},
    { letter: 'X', examples: [
      { word: 'Xícara', emoji: '☕' },
      { word: 'Xadrez', emoji: '♟️' },
      { word: 'Xilofone', emoji: '🎼' }
    ]},
    { letter: 'Y', examples: [
      { word: 'Yin Yang', emoji: '☯️' },
      { word: 'Yoga', emoji: '🧘' },
      { word: 'Yakult', emoji: '🥤' }
    ]},
    { letter: 'Z', examples: [
      { word: 'Zebra', emoji: '🦓' },
      { word: 'Zíper', emoji: '🤐' },
      { word: 'Zangão', emoji: '🐝' }
    ]}
  ];

  const gridContainer = document.getElementById('alphabetGrid');
  const displayBox = document.getElementById('displayBox');
  const displayLetter = document.getElementById('displayLetter');
  const displayEmoji = document.getElementById('displayEmoji');
  const displayWord = document.getElementById('displayWord');
  
  let currentActiveBtn = null;
  const exampleIndexByLetter = {};

  const AudioEngine = {
    speak: function(text) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'pt-BR';
        utterance.rate = 0.9;
        utterance.pitch = 1.1;
        window.speechSynthesis.speak(utterance);
      }
    }
  };

  function initGame() {
    alphabetData.forEach(item => {
      exampleIndexByLetter[item.letter] = 0;

      const btn = document.createElement('button');
      btn.className = 'letter-btn';
      btn.textContent = item.letter;
      
      btn.addEventListener('click', (e) => handleLetterClick(item, btn, e));
      gridContainer.appendChild(btn);
    });
  }

  function handleLetterClick(data, btnElement, event) {
    if (currentActiveBtn) {
      currentActiveBtn.classList.remove('active');
    }

    btnElement.classList.add('active');
    currentActiveBtn = btnElement;

    const currentIndex = exampleIndexByLetter[data.letter];
    const example = data.examples[currentIndex];

    exampleIndexByLetter[data.letter] = (currentIndex + 1) % data.examples.length;

    displayLetter.textContent = data.letter;
    displayEmoji.textContent = example.emoji;
    displayWord.textContent = example.word;

    displayBox.classList.remove('pop');
    void displayBox.offsetWidth;
    displayBox.classList.add('pop');

    AudioEngine.speak(`${data.letter}... ${example.word}`);

    const rect = btnElement.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;
    spawnParticles(centerX, centerY, example.emoji);
  }

  function spawnParticles(x, y, emoji) {
    const emojis = [emoji, '✨', '⭐'];
    for (let i = 0; i < 6; i++) {
      const el = document.createElement('div');
      el.className = 'particle';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      
      const tx = (Math.random() - 0.5) * 150 + 'px';
      const ty = (Math.random() - 0.5) * 150 + 'px';
      const rot = (Math.random() - 0.5) * 360 + 'deg';
      
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      el.style.setProperty('--tx', tx);
      el.style.setProperty('--ty', ty);
      el.style.setProperty('--rot', rot);
      
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 800);
    }
  }

  window.onload = initGame;
</script>
</body>
</html>
