<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turma Animada — KanAcademy</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sakana-widget@2.7.1/lib/sakana.min.css" />

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --blue-deep: #1a4fa0;
  --topbar-h: 64px;
}

html,
body {
  width: 100%;
  height: 100%;
  overflow: hidden;
}

body {
  font-family: 'Nunito', sans-serif;
  background: radial-gradient(ellipse at center top, #ffd270, #ffb03a);
  display: flex;
  flex-direction: column;
  user-select: none;
}

.topbar {
  height: var(--topbar-h);
  background: var(--blue-deep);
  padding: 0 22px;
  display: flex;
  align-items: center;
  box-shadow: 0 4px 20px rgba(0,0,0,.25);
  z-index: 10;
}

.back-link {
  color: #fff;
  text-decoration: none;
  font-size: 1.1rem;
  font-weight: 900;
  background: rgba(255,255,255,0.15);
  padding: 8px 18px;
  border-radius: 999px;
}

.board-wrap {
  flex: 1;
  width: 100%;
  padding: 28px 20px 24px;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.widget-area {
  width: min(90vw, 410px);
  height: min(68vh, 540px);

  display: flex;
  align-items: center;
  justify-content: center;

  position: relative;
  overflow: visible;
}

/* base visual do brinquedo */
.widget-area::after {
  content: "";
  position: absolute;
  bottom: 34px;
  left: 50%;
  transform: translateX(-50%);

  width: 72px;
  height: 14px;
  border-radius: 999px;

  background: rgba(255,255,255,0.85);
  box-shadow: 0 5px 0 rgba(26,79,160,0.35);
  z-index: 0;
}

#sakana-widget {
  width: 100%;
  height: 100%;
  overflow: visible;
  position: relative;
  z-index: 1;
}

#sakana-widget,
#sakana-widget * {
  overflow: visible !important;
}

.controls-row {
  margin-top: 8px;
}

.action-btn {
  background: #fff;
  border: 4px solid var(--blue-deep);
  color: var(--blue-deep);

  font-size: 1.3rem;
  font-weight: 900;
  font-family: 'Nunito', sans-serif;

  padding: 16px 32px;
  border-radius: 999px;
  cursor: pointer;

  box-shadow: 0 8px 0 var(--blue-deep);

  display: flex;
  align-items: center;
  gap: 10px;
}

.action-btn:active {
  transform: translateY(8px);
  box-shadow: 0 0 0 var(--blue-deep);
}

@media (max-width: 768px) {
  .board-wrap {
    padding: 24px 16px 22px;
  }

  .widget-area {
    width: 92vw;
    height: 540px;
  }

  .widget-area::after {
    bottom: 32px;
  }
}
</style>
</head>

<body>

<div class="topbar">
  <a href="../index.html" class="back-link">⬅ Voltar</a>
</div>

<main class="board-wrap">
  <section class="widget-area">
    <div id="sakana-widget"></div>
  </section>

  <div class="controls-row">
    <button class="action-btn" onclick="trocarPersonagem()">
      🎲 Trocar
    </button>
  </div>
</main>

<script>
let widgetInstance = null;
const TOTAL_IMAGENS = 5;
let currentPetIndex = 1;

function criarImagemComPadding(src, padding = 110) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = "anonymous";

    img.onload = () => {
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");

      canvas.width = img.width + padding * 2;
      canvas.height = img.height + padding * 2;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, padding, padding);

      resolve(canvas.toDataURL("image/sgv"));
    };

    img.onerror = reject;
    img.src = src;
  });
}

async function initSakanaWidget() {
  await carregarPersonagem(currentPetIndex);
}

async function carregarPersonagem(index) {
  const charName = `pcanina_${index}`;
  const imagePath = `../assets/pcanina/${index}.png`;

  const paddedImage = await criarImagemComPadding(imagePath, 110);
  const baseChar = SakanaWidget.getCharacter("chisato");

  const customChar = {
    ...baseChar,
    image: paddedImage,
    initialState: {
      ...baseChar.initialState,
      x: 0,
      y: 0,
      r: 0
    }
  };

  SakanaWidget.registerCharacter(charName, customChar);

  const container = document.querySelector("#sakana-widget");
  container.innerHTML = "";

  widgetInstance = new SakanaWidget({
    character: charName,
    autoFit: true,
    controls: false,

    /* mantém o palito/apoio */
    rod: true,

    draggable: true,
    stroke: {
      color: "#ffffff",
      width: 4
    }
  }).mount("#sakana-widget");
}

async function trocarPersonagem() {
  let nextIndex;

  do {
    nextIndex = Math.floor(Math.random() * TOTAL_IMAGENS) + 1;
  } while (nextIndex === currentPetIndex && TOTAL_IMAGENS > 1);

  currentPetIndex = nextIndex;
  await carregarPersonagem(currentPetIndex);
}
</script>

<script
  async
  onload="initSakanaWidget()"
  src="https://cdn.jsdelivr.net/npm/sakana-widget@2.7.1/lib/sakana.min.js">
</script>

</body>
</html>
