<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Encontre os Pares — KanAcademy</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sky:        #5bc8f5;
    --blue-deep:  #1a4fa0;
    --blue-mid:   #2a7fd4;
    --yellow:     #FFD740;
    --green:      #5DE87A;
    --red:        #ff5555;
    --card-back:  #2a7fd4;
    --topbar-h:   64px;
    --diffbar-h:  64px;
    --botbar-h:   88px;
  }

  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: 'Nunito', sans-serif;
    background: radial-gradient(ellipse at center top, #8de0ff, var(--sky));
    display: flex;
    flex-direction: column;
    user-select: none;
  }

  /* ── TOP BAR ── */
  .topbar {
    flex: 0 0 var(--topbar-h);
    background: var(--blue-deep);
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,.25);
    z-index: 10;
  }
  .back-btn {
    color: #fff;
    font-weight: 900;
    padding: 8px 18px;
    border-radius: 50px;
    background: rgba(255,255,255,.15);
    cursor: pointer;
    text-decoration: none;
    font-size: 0.95rem;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .back-btn:hover { background: rgba(255,255,255,.25); }
  .topbar-title { font-size: 1.2rem; font-weight: 900; color: #fff; flex: 1; }

  /* Timer */
  .timer-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 50px;
    padding: 6px 16px;
  }
  .timer-icon { font-size: 1.1rem; }
  .timer-display {
    font-size: 1.3rem;
    font-weight: 900;
    color: var(--yellow);
    min-width: 48px;
    text-align: center;
    transition: color 0.3s;
  }
  .timer-display.warning { color: #ff6b6b; animation: timerPulse 0.5s ease infinite alternate; }
  @keyframes timerPulse { from { transform: scale(1); } to { transform: scale(1.12); } }

  /* ── DIFF BAR ── */
  .diffbar {
    flex: 0 0 var(--diffbar-h);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: rgba(255,255,255,.15);
    backdrop-filter: blur(4px);
  }
  .diff-btn {
    font-family: inherit;
    font-weight: 900;
    padding: 10px 24px;
    border-radius: 50px;
    border: 4px solid transparent;
    cursor: pointer;
    transition: all .2s;
    font-size: 0.95rem;
  }
  .diff-btn.easy   { background: #5de87a; color: #0d4020; }
  .diff-btn.medium { background: #ffb347; color: #6b2a00; }
  .diff-btn.hard   { background: #ff5555; color: #5a0000; }
  .diff-btn.active { transform: scale(1.1); border-color: #fff; box-shadow: 0 4px 16px rgba(0,0,0,.2); }
  .diff-btn:not(.active):hover { transform: scale(1.05); }

  /* ── BOARD AREA ── */
  .board-wrap {
    flex: 1 1 0; min-height: 0;
    display: flex; align-items: center; justify-content: center;
    padding: 16px; overflow: hidden; position: relative;
    max-width: 960px;
    margin: 0 auto;
    width: 100%;
  }
  #board { display: grid; justify-content: center; align-content: center; }

  /* ── CARDS ── */
  .card { perspective: 900px; cursor: pointer; }
  .card-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform .45s cubic-bezier(.175,.885,.32,1.275);
    border-radius: 18px;
  }
  .card.flipped .card-inner,
  .card.matched .card-inner { transform: rotateY(180deg); }

  .card-face {
    position: absolute; inset: 0;
    border-radius: 18px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow: hidden;
  }

  .card-back {
    background: linear-gradient(135deg, #2a7fd4 0%, #1a4fa0 100%);
    display: flex; align-items: center; justify-content: center;
    border: 4px solid rgba(255,255,255,.25);
    box-shadow: 0 6px 18px rgba(0,0,0,.2), inset 0 1px 0 rgba(255,255,255,.1);
    transition: border-color 0.3s;
  }
  .card-back::after {
    content: '?';
    font-size: calc(var(--cs, 100px) * .48);
    font-weight: 900;
    color: rgba(255,255,255,.35);
  }
  .card:hover:not(.flipped):not(.matched) .card-back {
    border-color: rgba(255,255,255,.55);
    transform: scale(0.97);
    box-shadow: 0 8px 24px rgba(0,0,0,.3);
  }
  .card:hover:not(.flipped):not(.matched) .card-inner { transform: rotateY(5deg); }

  .card-front {
    transform: rotateY(180deg);
    display: flex; align-items: center; justify-content: center;
    border: 4px solid rgba(255,255,255,.8);
    box-shadow: 0 6px 18px rgba(0,0,0,.2);
  }
  .card-front .emoji { font-size: calc(var(--cs, 100px) * .55); line-height: 1; }
  .card-front .card-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
    border-radius: 14px;
  }

  /* Matched state */
  .card.matched .card-front {
    border-color: #5de87a;
    box-shadow: 0 0 0 4px #5de87a, 0 8px 24px rgba(93,232,122,.4);
    animation: matchPop .5s ease;
  }
  @keyframes matchPop {
    0%   { transform: rotateY(180deg) scale(1); }
    45%  { transform: rotateY(180deg) scale(1.18); }
    70%  { transform: rotateY(180deg) scale(0.95); }
    100% { transform: rotateY(180deg) scale(1); }
  }

  /* Error shake */
  .card.error .card-inner {
    animation: shakeCard 0.5s ease;
  }
  @keyframes shakeCard {
    0%,100% { transform: rotateY(180deg) translateX(0); }
    20%  { transform: rotateY(180deg) translateX(-6px); }
    40%  { transform: rotateY(180deg) translateX(6px); }
    60%  { transform: rotateY(180deg) translateX(-5px); }
    80%  { transform: rotateY(180deg) translateX(5px); }
  }
  .card.error .card-front { border-color: var(--red); box-shadow: 0 0 0 4px var(--red); }

  /* Hint */
  .hint-wiggle { animation: wiggle .7s ease-in-out 3; }
  @keyframes wiggle {
    0%,100% { transform: rotate(0deg); }
    25% { transform: rotate(-6deg) scale(1.05); }
    75% { transform: rotate(6deg) scale(1.05); }
  }
  .hint-wiggle .card-back { border-color: var(--yellow); box-shadow: 0 0 0 3px var(--yellow); }

  /* ── TOAST ── */
  .toast {
    position: absolute; top: 8%; left: 50%;
    transform: translate(-50%, -20px);
    background: var(--yellow); color: var(--blue-deep);
    padding: 12px 30px; border-radius: 50px;
    font-size: 1.4rem; font-weight: 900;
    opacity: 0; pointer-events: none; z-index: 50;
    transition: all .3s cubic-bezier(.25,.8,.25,1);
    white-space: nowrap;
    box-shadow: 0 6px 20px rgba(255,215,64,.5);
  }
  .toast.show { opacity: 1; transform: translate(-50%, 0); }

  /* Combo flash */
  .combo-toast {
    position: absolute; top: 18%; left: 50%;
    transform: translate(-50%, 0) scale(0.5);
    background: linear-gradient(135deg, #ff6b6b, #ff3399);
    color: white;
    padding: 8px 22px; border-radius: 50px;
    font-size: 1.2rem; font-weight: 900;
    opacity: 0; pointer-events: none; z-index: 50;
    transition: all .4s cubic-bezier(.25,.8,.25,1);
  }
  .combo-toast.show { opacity: 1; transform: translate(-50%, 0) scale(1); }

  /* ── BOTTOM BAR ── */
  .botbar {
    flex: 0 0 var(--botbar-h);
    background: var(--blue-deep);
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    box-shadow: 0 -4px 20px rgba(0,0,0,.2);
  }
  .reset-btn {
    background: var(--yellow); color: var(--blue-deep);
    font-weight: 900; font-size: 1rem;
    height: 52px; padding: 0 24px;
    border: none; border-radius: 14px; cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 12px rgba(255,215,64,.4);
  }
  .reset-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255,215,64,.5); }
  .reset-btn:active { transform: translateY(0); }

  .botbar-center {
    display: flex; align-items: center; gap: 20px;
  }

  .moves-wrapper { display: flex; align-items: center; gap: 10px; }
  .moves-label { color: rgba(255,255,255,.75); font-size: 1rem; font-weight: 900; }
  .moves-box {
    min-width: 64px; height: 64px;
    border-radius: 16px;
    background: rgba(255,255,255,.1);
    border: 3px solid var(--yellow);
    color: var(--yellow); font-size: 2.2rem; font-weight: 900;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s;
    padding: 0 10px;
  }
  .moves-box.bump { animation: moveBump 0.2s ease; }
  @keyframes moveBump { 0%,100% { transform: scale(1); } 50% { transform: scale(1.18); } }

  /* Progress bar */
  .progress-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .progress-label { color: rgba(255,255,255,.75); font-size: 0.8rem; font-weight: 900; }
  .progress-track {
    width: 120px; height: 10px;
    background: rgba(255,255,255,.15);
    border-radius: 99px; overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #5de87a, #38c95a);
    border-radius: 99px;
    width: 0%;
    transition: width 0.4s cubic-bezier(.25,.8,.25,1);
    box-shadow: 0 0 8px rgba(93,232,122,.6);
  }

  /* ── WIN OVERLAY ── */
  .win-overlay {
    position: fixed; inset: 0;
    background: rgba(26,79,160,.88);
    backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: center;
    z-index: 999; opacity: 0; pointer-events: none;
    transition: opacity .4s;
  }
  .win-overlay.show { opacity: 1; pointer-events: all; }
  .win-box {
    background: #fff; border-radius: 32px;
    padding: 40px 48px; text-align: center;
    max-width: 460px; width: 92%;
    transform: scale(0.8) translateY(20px);
    transition: transform .5s cubic-bezier(.25,.8,.25,1);
    box-shadow: 0 30px 80px rgba(0,0,0,.35);
  }
  .win-overlay.show .win-box { transform: scale(1) translateY(0); }
  .win-box .trophy { font-size: 80px; margin-bottom: 8px; }
  .win-box h2 { font-size: 2.4rem; font-weight: 900; color: var(--blue-deep); margin-bottom: 6px; }
  .win-box .win-sub { color: #778; font-size: 1rem; font-weight: 700; margin-bottom: 24px; }

  /* Stars rating */
  .stars-rating {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; margin-bottom: 20px;
    font-size: 3rem;
  }
  .star-el { filter: grayscale(1) opacity(0.3); transition: all 0.4s; transform: scale(0.7); }
  .star-el.lit { filter: none; transform: scale(1); animation: starPop 0.4s cubic-bezier(.25,.8,.25,1) both; }
  @keyframes starPop {
    0%   { transform: scale(0); }
    60%  { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  .win-stats {
    display: flex; gap: 16px; justify-content: center; margin-bottom: 28px;
  }
  .win-stat {
    background: #f0f5ff; border-radius: 16px; padding: 14px 20px;
    text-align: center; flex: 1;
  }
  .win-stat-val { font-size: 1.8rem; font-weight: 900; color: var(--blue-deep); }
  .win-stat-label { font-size: 0.8rem; font-weight: 700; color: #889; margin-top: 2px; }

  .win-btn {
    background: var(--yellow); color: var(--blue-deep);
    font-weight: 900; font-size: 1.05rem;
    padding: 16px 28px; border: none; border-radius: 50px;
    cursor: pointer; width: 100%; margin-top: 10px;
    transition: all 0.2s;
    box-shadow: 0 4px 14px rgba(255,215,64,.4);
  }
  .win-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,215,64,.5); }
  .win-btn.secondary { background: #eef1ff; box-shadow: none; }
  .win-btn.secondary:hover { box-shadow: 0 4px 12px rgba(0,0,0,.1); }

  /* ── PARTICLES ── */
  .particle {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    font-size: 24px;
    animation: particleFly 1.2s ease-out forwards;
  }
  @keyframes particleFly {
    0%   { opacity: 1; transform: translate(0,0) scale(1) rotate(0deg); }
    100% { opacity: 0; transform: var(--dest) scale(0.4) rotate(var(--rot)); }
  }

  /* ── ENTRY ANIMATION ── */
  .card { opacity: 0; animation: cardEntry 0.4s ease forwards; }
  @keyframes cardEntry {
    from { opacity: 0; transform: translateY(20px) scale(0.85); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  @media (max-width: 600px) {
    .botbar { padding: 0 14px; gap: 10px; }
    .moves-label, .progress-wrap, .timer-wrap .timer-icon { display: none; }
    .diff-btn { padding: 8px 16px; font-size: 0.9rem; }
  }
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="back-btn">← Voltar</a>
  <span class="topbar-title">🧩 Encontre os Pares!</span>
  <div class="timer-wrap">
    <span class="timer-icon">⏱</span>
    <span class="timer-display" id="timerDisplay">0:00</span>
  </div>
</div>

<div class="diffbar">
  <button class="diff-btn easy active"  onclick="setDiff('easy')">😊 Fácil</button>
  <button class="diff-btn medium"       onclick="setDiff('medium')">😤 Médio</button>
  <button class="diff-btn hard"         onclick="setDiff('hard')">🔥 Difícil</button>
</div>

<div class="board-wrap">
  <div class="toast"       id="toast">Muito Bem!</div>
  <div class="combo-toast" id="comboToast">🔥 Combo!</div>
  <div id="board"></div>
</div>

<div class="botbar">
  <button class="reset-btn" onclick="resetGame()">🔄 Recomeçar</button>

  <div class="botbar-center">
    <div class="progress-wrap">
      <span class="progress-label" id="progressLabel">0 / 0 pares</span>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    </div>
  </div>

  <div class="moves-wrapper">
    <span class="moves-label">Jogadas:</span>
    <div class="moves-box" id="movesDisplay">0</div>
  </div>
</div>

<div class="win-overlay" id="winOverlay">
  <div class="win-box">
    <div class="trophy">🏆</div>
    <h2>Você Conseguiu!</h2>
    <p class="win-sub" id="winSub">Incrível desempenho!</p>

    <div class="stars-rating">
      <span class="star-el" id="star1">⭐</span>
      <span class="star-el" id="star2">⭐</span>
      <span class="star-el" id="star3">⭐</span>
    </div>

    <div class="win-stats">
      <div class="win-stat">
        <div class="win-stat-val" id="winMoves">0</div>
        <div class="win-stat-label">Jogadas</div>
      </div>
      <div class="win-stat">
        <div class="win-stat-val" id="winTime">0:00</div>
        <div class="win-stat-label">Tempo</div>
      </div>
    </div>

    <button class="win-btn" onclick="nextDiff()">🌟 Próximo Desafio</button>
    <button class="win-btn secondary" onclick="resetGame();closeWin();">🔄 Jogar Novamente</button>
  </div>
</div>

<script>
// ── DATA ──
//
// Cada carta pode usar EMOJI ou IMAGEM PNG. Exemplos:
//
//   Emoji:  { id:1, emoji:'🐶', bg:'#FF6B6B' }
//   Imagem: { id:1, img:'imagens/cachorro.png', bg:'#FF6B6B' }
//
// → "img" é o caminho relativo ao HTML (ou URL absoluta)
// → "bg" é a cor de fundo da face revelada
// → Misturar emoji e img no mesmo deck é permitido
//
const CHARS = [
  { id:1,  img:'assets/cards/card-01.png', bg:'#FF6B6B' },
  { id:2,  img:'assets/cards/card-02.png', bg:'#FFA94D' },
  { id:3,  img:'assets/cards/card-03.png', bg:'#FFD740' },
  { id:4,  img:'assets/cards/card-04.png', bg:'#5DE87A' },
  { id:5,  img:'assets/cards/card-05.png', bg:'#C77DFF' },
  { id:6,  img:'assets/cards/card-06.png', bg:'#FF8C6B' },
  { id:7,  img:'assets/cards/card-07.png', bg:'#5BC8F5' },
  { id:8,  img:'assets/cards/card-08.png', bg:'#4DD0E1' },
  { id:9,  img:'assets/cards/card-09.png', bg:'#A26030' },
  { id:10, img:'assets/cards/card-10.png', bg:'#FF85B3' },
  { id:11, img:'assets/cards/card-11.png', bg:'#F25D94' },
  { id:12, img:'assets/cards/card-12.png', bg:'#69C0FF' },
  { id:13, img:'assets/cards/card-13.png', bg:'#FFD54F' },
  { id:14, img:'assets/cards/card-14.png', bg:'#9C27B0' },
  { id:15, img:'assets/cards/card-15.png', bg:'#8BC34A' },
  { id:16, img:'assets/cards/card-16.png', bg:'#FF5722' }
];

// ── HELPER: renderiza o conteúdo da face da carta ──
// Suporta emoji (campo "emoji") ou imagem PNG (campo "img").
function cardFaceContent(tile) {
  if (tile.img) {
    return `<img class="card-img" src="${tile.img}" alt="carta ${tile.id}" draggable="false">`;
  }
  return `<span class="emoji">${tile.emoji}</span>`;
}

const FEEDBACK = ['Uau! 🎉', 'Isso aí! 💪', 'Incrível! 🌟', 'Perfeito! ✨', 'Show! 🔥'];
const COMBOS   = ['🔥 2x Combo!', '⚡ 3x Combo!', '💥 4x Combo!', '🌟 MEGA COMBO!'];
const LEVELS   = {
  easy:   { pairs: 3, cols: 3, time: 90,  starLimits: [15, 10, 6]  },
  medium: { pairs: 6, cols: 4, time: 120, starLimits: [30, 20, 12] },
  hard:   { pairs: 10, cols: 5, time: 180, starLimits: [50, 35, 22] }
};
const ORDER = ['easy','medium','hard'];

// ── STATE ──
let diff = 'easy';
let deck = [], flipped = [], matched = [];
let moves = 0, locked = false, consecutiveMisses = 0, combo = 0;
let timerInterval = null, elapsed = 0;

// ── UTILS ──
const shuffle = a => {
  const b = [...a];
  for (let i = b.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [b[i],b[j]] = [b[j],b[i]];
  }
  return b;
};

const gc = idx => document.querySelector(`[data-idx="${idx}"]`);

const fmt = s => `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;

// ── TIMER ──
function startTimer() {
  clearInterval(timerInterval);
  elapsed = 0;
  const display = document.getElementById('timerDisplay');
  display.classList.remove('warning');
  display.textContent = '0:00';
  const limit = LEVELS[diff].time;

  timerInterval = setInterval(() => {
    elapsed++;
    display.textContent = fmt(elapsed);
    const remaining = limit - elapsed;
    if (remaining <= 15 && remaining > 0) display.classList.add('warning');
    else display.classList.remove('warning');
  }, 1000);
}
function stopTimer() { clearInterval(timerInterval); }

// ── DECK BUILD ──
function buildDeck(pairs) {
  const chars = shuffle(CHARS).slice(0, pairs);
  const tiles = [];
  chars.forEach(c => {
    tiles.push({...c, uid: c.id*100+1});
    tiles.push({...c, uid: c.id*100+2});
  });
  return shuffle(tiles);
}

// ── DIFFICULTY ──
function setDiff(d) {
  diff = d;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.diff-btn.${d}`).classList.add('active');
  resetGame();
}

// ── RESET ──
function resetGame() {
  const { pairs, cols } = LEVELS[diff];
  deck = buildDeck(pairs);
  flipped = []; matched = []; moves = 0; consecutiveMisses = 0; combo = 0; locked = false;

  document.getElementById('movesDisplay').textContent = '0';
  updateProgress();
  closeWin();
  startTimer();
  renderBoard(cols);
}

// ── PROGRESS ──
function updateProgress() {
  const { pairs } = LEVELS[diff];
  const pct = (matched.length / pairs) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${matched.length} / ${pairs} pares`;
}

// ── BOARD ──
function renderBoard(cols) {
  const board = document.getElementById('board');
  board.innerHTML = '';
  const rows = Math.ceil(deck.length / cols);
  const wrap = document.querySelector('.board-wrap');
  const GAP = 14;
  const pw = wrap.clientWidth - 32;
  const ph = wrap.clientHeight - 32;

  const byCW = Math.floor((pw - GAP*(cols-1)) / cols);
  const byCH = Math.floor((ph - GAP*(rows-1)) / rows);
  const cs = Math.max(70, Math.min(byCW, byCH, 200));

  board.style.setProperty('--cs', cs + 'px');
  board.style.gridTemplateColumns = `repeat(${cols}, ${cs}px)`;
  board.style.gridTemplateRows = `repeat(${rows}, ${cs}px)`;
  board.style.gap = GAP + 'px';

  deck.forEach((tile, idx) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.idx = idx;
    card.dataset.id  = tile.id;
    card.style.cssText = `width:${cs}px;height:${cs}px;animation-delay:${idx * 40}ms`;
    card.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-back"></div>
        <div class="card-face card-front" style="background:${tile.bg}">
          ${cardFaceContent(tile)}
        </div>
      </div>`;
    card.addEventListener('click', () => flip(card, idx));
    board.appendChild(card);
  });
}

// ── FLIP ──
function flip(card, idx) {
  if (locked || flipped.includes(idx) || matched.includes(deck[idx].id) || flipped.length >= 2) return;
  document.querySelectorAll('.hint-wiggle').forEach(c => c.classList.remove('hint-wiggle'));
  card.classList.add('flipped');
  flipped.push(idx);

  if (flipped.length === 2) {
    moves++;
    const mb = document.getElementById('movesDisplay');
    mb.textContent = moves;
    mb.classList.remove('bump');
    void mb.offsetWidth;
    mb.classList.add('bump');
    locked = true;
    checkMatch();
  }
}

// ── MATCH CHECK ──
function checkMatch() {
  const [a, b] = flipped;
  if (deck[a].id === deck[b].id) {
    matched.push(deck[a].id);
    combo++;
    consecutiveMisses = 0;

    setTimeout(() => {
      gc(a).classList.add('matched');
      gc(b).classList.add('matched');

      // Toast
      const t = document.getElementById('toast');
      t.textContent = FEEDBACK[Math.floor(Math.random() * FEEDBACK.length)];
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 1300);

      // Combo toast
      if (combo >= 2) {
        const ct = document.getElementById('comboToast');
        ct.textContent = COMBOS[Math.min(combo-2, COMBOS.length-1)];
        ct.classList.add('show');
        setTimeout(() => ct.classList.remove('show'), 1500);
      }

      updateProgress();
      flipped = []; locked = false;

      if (matched.length === LEVELS[diff].pairs) setTimeout(showWin, 600);
    }, 280);

  } else {
    combo = 0;
    consecutiveMisses++;

    // Shake both cards
    [a, b].forEach(idx => {
      const c = gc(idx);
      c.classList.add('error');
      setTimeout(() => c.classList.remove('error'), 600);
    });

    setTimeout(() => {
      gc(a).classList.remove('flipped');
      gc(b).classList.remove('flipped');
      flipped = []; locked = false;

      // Hint after 3 consecutive misses
      if (consecutiveMisses >= 3) {
        const hintId = deck.find(t => !matched.includes(t.id))?.id;
        if (hintId) {
          document.querySelectorAll(`[data-id="${hintId}"]`).forEach(c => c.classList.add('hint-wiggle'));
        }
        consecutiveMisses = 0;
      }
    }, 950);
  }
}

// ── STARS ──
function calcStars() {
  const { starLimits } = LEVELS[diff];
  if (moves <= starLimits[2]) return 3;
  if (moves <= starLimits[1]) return 2;
  if (moves <= starLimits[0]) return 1;
  return 1;
}

// ── WIN ──
function showWin() {
  stopTimer();
  const stars = calcStars();
  const subs = ['Muito bom! Continue assim!', 'Ótimo desempenho! 💪', '🌟 Perfeito! Você é incrível!'];

  document.getElementById('winMoves').textContent = moves;
  document.getElementById('winTime').textContent  = fmt(elapsed);
  document.getElementById('winSub').textContent   = subs[stars - 1];

  // Reset stars
  ['star1','star2','star3'].forEach(id => {
    document.getElementById(id).classList.remove('lit');
  });

  document.getElementById('winOverlay').classList.add('show');

  // Animate stars with delay
  for (let i = 0; i < stars; i++) {
    setTimeout(() => {
      document.getElementById(`star${i+1}`).classList.add('lit');
    }, 300 + i * 250);
  }

  // Particles
  setTimeout(spawnParticles, 400);
}

function closeWin() {
  document.getElementById('winOverlay').classList.remove('show');
}

function nextDiff() {
  closeWin();
  const i = ORDER.indexOf(diff);
  setDiff(ORDER[i < ORDER.length-1 ? i+1 : 0]);
}

// ── PARTICLES ──
function spawnParticles() {
  const emojis = ['⭐','🌟','🎉','✨','🎊','💫','🌈','🎈'];
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;

  for (let i = 0; i < 20; i++) {
    const el = document.createElement('div');
    el.className = 'particle';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    const dx = (Math.random() - 0.5) * 500;
    const dy = (Math.random() - 0.5) * 500;
    const rot = `${(Math.random()-0.5)*720}deg`;
    el.style.cssText = `left:${cx}px;top:${cy}px;--dest:translate(${dx}px,${dy}px);--rot:${rot};animation-delay:${Math.random()*300}ms`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1800);
  }
}

// ── INIT ──
resetGame();

let rTimer;
window.addEventListener('resize', () => {
  clearTimeout(rTimer);
  rTimer = setTimeout(() => renderBoard(LEVELS[diff].cols), 150);
});
</script>
