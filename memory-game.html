<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Match-up — KanAcademy</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sky:        #5bc8f5;
    --blue-deep:  #1a4fa0;
    --yellow:     #FFD740;
    --card-back:  #2a7fd4;
    --topbar-h:   64px;
    --diffbar-h:  64px;
    --botbar-h:   100px;
  }

  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: 'Nunito', sans-serif;
    background: radial-gradient(circle at center, #8de0ff, var(--sky));
    display: flex;
    flex-direction: column;
    user-select: none;
  }

  /* ── INTERFACE SUPERIOR ── */
  .topbar { flex: 0 0 var(--topbar-h); background: var(--blue-deep); padding: 0 24px; display: flex; align-items: center; gap: 16px; box-shadow: 0 4px 16px rgba(0,0,0,.2); z-index: 10; }
  .back-btn { color: #fff; font-weight: 900; padding: 10px 20px; border-radius: 50px; background: rgba(255,255,255,.15); cursor: pointer; text-decoration: none; }
  .topbar-title { font-size: 1.2rem; font-weight: 900; color: #fff; }

  .diffbar { flex: 0 0 var(--diffbar-h); display: flex; align-items: center; justify-content: center; gap: 12px; background: rgba(255,255,255,.2); }
  .diff-btn { font-family: inherit; font-weight: 900; padding: 10px 24px; border-radius: 50px; border: 4px solid transparent; cursor: pointer; transition: all .2s; }
  .diff-btn.easy   { background: #5de87a; color: #0d4020; }
  .diff-btn.medium { background: #ffb347; color: #6b2a00; }
  .diff-btn.hard   { background: #ff5555; color: #5a0000; }
  .diff-btn.active { transform: scale(1.1); border-color: #fff; }

  /* ── ÁREA DO TABULEIRO (BOUNDED AREA) ── */
  .board-wrap {
    flex: 1 1 0; min-height: 0;
    display: flex; align-items: center; justify-content: center;
    padding: 20px; overflow: hidden; position: relative;
    /* Configuração para Desktop: Mantém a proporção no centro */
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
  }
  #board { display: grid; justify-content: center; align-content: center; }

  /* ── CARTAS ── */
  .card { perspective: 800px; cursor: pointer; }
  .card-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform .5s cubic-bezier(.175, .885, .32, 1.275); border-radius: 18px; }
  .card.flipped .card-inner, .card.matched .card-inner { transform: rotateY(180deg); }
  .card-face { position: absolute; inset: 0; border-radius: 18px; backface-visibility: hidden; -webkit-backface-visibility: hidden; overflow: hidden; }
  
  .card-back { background: var(--card-back); display: flex; align-items: center; justify-content: center; border: 5px solid rgba(255,255,255,.3); box-shadow: 0 6px 16px rgba(0,0,0,.2); }
  .card-back::after { content: '?'; font-size: calc(var(--cs, 100px) * .5); font-weight: 900; color: rgba(255,255,255,.4); }
  .card-front { transform: rotateY(180deg); display: flex; align-items: center; justify-content: center; border: 5px solid #fff; box-shadow: 0 6px 16px rgba(0,0,0,.2); }
  .card-front .emoji { font-size: calc(var(--cs, 100px) * .55); line-height: 1; }

  .card.matched .card-front { border-color: #5de87a; box-shadow: 0 0 0 5px #5de87a, 0 8px 20px rgba(0,0,0,.2); animation: matchPop .5s ease; }
  @keyframes matchPop { 0% { transform: rotateY(180deg) scale(1); } 50% { transform: rotateY(180deg) scale(1.15); } 100% { transform: rotateY(180deg) scale(1); } }

  /* Dica Adaptativa */
  .hint-wiggle { animation: wiggle .6s ease-in-out infinite; }
  @keyframes wiggle { 0%, 100% { transform: rotate(0deg); border-color: var(--yellow); } 25% { transform: rotate(-5deg); } 75% { transform: rotate(5deg); } }

  /* ── FEEDBACK E INFERIOR ── */
  .toast { position: absolute; top: 10%; left: 50%; transform: translate(-50%, -20px); background: var(--yellow); color: var(--blue-deep); padding: 12px 30px; border-radius: 50px; font-size: 1.5rem; font-weight: 900; opacity: 0; pointer-events: none; z-index: 50; transition: all .3s; }
  .toast.show { opacity: 1; transform: translate(-50%, 0); }

  .botbar { flex: 0 0 var(--botbar-h); background: var(--blue-deep); display: flex; align-items: center; justify-content: space-between; padding: 0 36px; }
  .reset-btn { background: var(--yellow); color: var(--blue-deep); font-weight: 900; font-size: 1.1rem; height: 60px; padding: 0 32px; border: none; border-radius: 18px; cursor: pointer; }
  .moves-wrapper { display: flex; align-items: center; gap: 12px; }
  .moves-label { color: #fff; font-size: 1.2rem; font-weight: 900; }
  .moves-box { width: 80px; height: 80px; border-radius: 18px; background: rgba(255,255,255,.1); border: 4px solid var(--yellow); color: var(--yellow); font-size: 2.5rem; font-weight: 900; display: flex; align-items: center; justify-content: center; }

  /* ── VITÓRIA ── */
  .win-overlay { position: fixed; inset: 0; background: rgba(26,79,160,.85); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 999; opacity: 0; pointer-events: none; transition: opacity .4s; }
  .win-overlay.show { opacity: 1; pointer-events: all; }
  .win-box { background: #fff; border-radius: 30px; padding: 40px 50px; text-align: center; max-width: 450px; width: 90%; transform: scale(0.8); transition: transform .5s; }
  .win-overlay.show .win-box { transform: scale(1); }
  .win-box .trophy { font-size: 90px; margin-bottom: 10px; }
  .win-box h2 { font-size: 2.5rem; font-weight: 900; color: var(--blue-deep); }
  .win-box .win-count { font-size: 2.8rem; font-weight: 900; color: #5de87a; margin-bottom: 30px; }
  .win-btn { background: var(--yellow); color: var(--blue-deep); font-weight: 900; font-size: 1.1rem; padding: 16px 32px; border: none; border-radius: 50px; cursor: pointer; width: 100%; margin-top: 10px; }

  @media (max-width: 600px) { .botbar { padding: 0 16px; } .moves-label { display: none; } }
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="back-btn">← Voltar</a>
  <span class="topbar-title">🧩 Encontre os Pares!</span>
</div>

<div class="diffbar">
  <button class="diff-btn easy active"  onclick="setDiff('easy')">Fácil</button>
  <button class="diff-btn medium"       onclick="setDiff('medium')">Médio</button>
  <button class="diff-btn hard"         onclick="setDiff('hard')">Difícil</button>
</div>

<div class="board-wrap">
  <div class="toast" id="toast">Muito Bem!</div>
  <div id="board"></div>
</div>

<div class="botbar">
  <button class="reset-btn" onclick="resetGame()">🔄 Recomeçar</button>
  <div class="moves-wrapper">
    <span class="moves-label">Jogadas:</span>
    <div class="moves-box" id="movesDisplay">0</div>
  </div>
</div>

<div class="win-overlay" id="winOverlay">
  <div class="win-box">
    <div class="trophy">🏆</div>
    <h2>Você Conseguiu!</h2>
    <div class="win-count" id="winCount">0 jogadas</div>
    <button class="win-btn" onclick="nextDiff()">🌟 Próximo Desafio</button>
    <button class="win-btn" style="background:#e8eeff" onclick="resetGame();closeWin();">🔄 Jogar Novamente</button>
  </div>
</div>

<script>
const CHARS = [
  { id:1, emoji:'🐶', bg:'#FF6B6B' }, { id:2, emoji:'🐱', bg:'#FFA94D' },
  { id:3, emoji:'🦁', bg:'#FFD740' }, { id:4, emoji:'🐸', bg:'#5DE87A' },
  { id:5, emoji:'🐼', bg:'#C77DFF' }, { id:6, emoji:'🐯', bg:'#FF8C6B' },
  { id:7, emoji:'🦝', bg:'#5BC8F5' }, { id:8, emoji:'🐺', bg:'#4DD0E1' },
  { id:9, emoji:'🐻', bg:'#A26030' }, { id:10, emoji:'🦄', bg:'#FF85B3' }
];

const FEEDBACK_MSGS = ["Uau!", "Isso aí!", "Muito bem!", "Incrível!"];

// ── Níveis Otimizados para 4 anos ──
const LEVELS = {
  easy:   { pairs: 3, cols: 3 }, // 6 cartas: muito grandes e fáceis
  medium: { pairs: 6, cols: 4 }, // 12 cartas: tamanho médio
  hard:   { pairs: 10, cols: 5 } // 20 cartas: menores, preenchem o espaço
};
const ORDER = ['easy','medium','hard'];

let diff = 'easy';
let deck = [], flipped = [], matched = [];
let moves = 0, locked = false, consecutiveMisses = 0;

const shuffle = a => {
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
};

function buildDeck(pairs) {
  const chars = shuffle([...CHARS]).slice(0, pairs);
  const tiles = [];
  chars.forEach(c => { tiles.push({...c, uid: c.id*100+1}); tiles.push({...c, uid: c.id*100+2}); });
  return shuffle(tiles);
}

function setDiff(d) {
  diff = d;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.diff-btn.${d}`).classList.add('active');
  resetGame();
}

function resetGame() {
  const { pairs, cols } = LEVELS[diff];
  deck = buildDeck(pairs);
  flipped = []; matched = []; moves = 0; consecutiveMisses = 0; locked = false;
  document.getElementById('movesDisplay').textContent = 0;
  closeWin();
  renderBoard(cols);
}

// ── CÁLCULO DE PROPORÇÃO ADAPTATIVA ──
function renderBoard(cols) {
  const board = document.getElementById('board');
  board.innerHTML = '';
  const rows = Math.ceil(deck.length / cols);
  const wrap = document.querySelector('.board-wrap');
  
  const GAP = 16;
  const pw = wrap.clientWidth - 40;
  const ph = wrap.clientHeight - 40;
  
  const byCW = Math.floor((pw - GAP*(cols-1)) / cols);
  const byCH = Math.floor((ph - GAP*(rows-1)) / rows);
  
  // Limite superior aumentado (220px) permite que as 6 cartas do nível Fácil fiquem gigantes e preencham a tela
  const cs = Math.max(70, Math.min(byCW, byCH, 220)); 

  board.style.setProperty('--cs', cs + 'px');
  board.style.gridTemplateColumns = `repeat(${cols}, ${cs}px)`;
  board.style.gridTemplateRows = `repeat(${rows}, ${cs}px)`;
  board.style.gap = GAP + 'px';

  deck.forEach((tile, idx) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.idx = idx;
    card.dataset.id = tile.id;
    card.style.cssText = `width:${cs}px;height:${cs}px`;
    card.innerHTML = `<div class="card-inner"><div class="card-face card-back"></div><div class="card-face card-front" style="background:${tile.bg}"><span class="emoji">${tile.emoji}</span></div></div>`;
    card.addEventListener('click', () => flip(card, idx));
    board.appendChild(card);
  });
}

function flip(card, idx) {
  if (locked || flipped.includes(idx) || matched.includes(deck[idx].id) || flipped.length >= 2) return;
  document.querySelectorAll('.hint-wiggle').forEach(c => c.classList.remove('hint-wiggle'));
  card.classList.add('flipped');
  flipped.push(idx);

  if (flipped.length === 2) {
    moves++;
    document.getElementById('movesDisplay').textContent = moves;
    locked = true;
    checkMatch();
  }
}

function gc(idx) { return document.querySelector(`[data-idx="${idx}"]`); }

function checkMatch() {
  const [a, b] = flipped;
  if (deck[a].id === deck[b].id) {
    matched.push(deck[a].id);
    consecutiveMisses = 0; 
    setTimeout(() => {
      gc(a).classList.add('matched'); gc(b).classList.add('matched');
      const t = document.getElementById('toast'); t.textContent = FEEDBACK_MSGS[Math.floor(Math.random() * FEEDBACK_MSGS.length)];
      t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 1500);
      flipped = []; locked = false;
      if (matched.length === LEVELS[diff].pairs) setTimeout(showWin, 600);
    }, 300);
  } else {
    consecutiveMisses++;
    setTimeout(() => {
      gc(a).classList.remove('flipped'); gc(b).classList.remove('flipped');
      flipped = []; locked = false;
      if (consecutiveMisses >= 3) {
        const unmapped = deck.find(t => !matched.includes(t.id)).id;
        document.querySelectorAll(`[data-id="${unmapped}"] .card-back`).forEach(c => c.classList.add('hint-wiggle'));
        consecutiveMisses = 0;
      }
    }, 1000);
  }
}

function showWin() { document.getElementById('winCount').textContent = moves; document.getElementById('winOverlay').classList.add('show'); }
function closeWin() { document.getElementById('winOverlay').classList.remove('show'); }
function nextDiff() { closeWin(); const i = ORDER.indexOf(diff); setDiff(ORDER[i < ORDER.length-1 ? i+1 : 0]); }

resetGame();
let rTimer;
window.addEventListener('resize', () => { clearTimeout(rTimer); rTimer = setTimeout(() => renderBoard(LEVELS[diff].cols), 150); });
</script>
</body>
</html>
